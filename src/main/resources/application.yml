server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ems_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 1254
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none  # Don't validate or modify schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        # Disable strict type checking for enums
        jakarta.persistence.schema-generation.database.action: none
    defer-datasource-initialization: true

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

logging:
  level:
    com.vikram.ems: DEBUG
    org.springframework.security: INFO
    org.hibernate: WARN  # Reduce Hibernate logging
  file:
    name: logs/ems-application.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"